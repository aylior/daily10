<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v66</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .card { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #282828; }
        
        /* Header */
        .header-box { text-align: center; margin-bottom: 8px; }
        .app-title { color: var(--neon); margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .v-tag { color: var(--dim); font-size: 9px; font-family: monospace; display: block; margin-top: -2px; }

        /* Buttons & Icons */
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: var(--neon); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex: 1; }
        .btn-sec { background: #2a2a2a; color: white; }
        .btn-icon { width: 44px; height: 44px; flex: none; padding: 0; }
        svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Modals & Inputs */
        input, select, textarea { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }
        label { font-size: 10px; font-weight: 800; color: var(--neon); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; }

        /* Player Interface */
        .workout-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .player-frame { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-frame iframe { width: 100%; height: 100%; border: none; }
        .workout-footer { background: var(--bg); padding: 20px 20px 40px; border-top: 1px solid #333; text-align: center; }
        .timer-display { font-size: 64px; font-weight: 900; color: var(--neon); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 10px; }

        /* Calendar & Streak */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; background: #1f1f1f; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cal-day.done { background: var(--neon); color: #000; font-weight: bold; }
        .streak-footer { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 15px; color: var(--neon); font-weight: 800; font-size: 14px; border-top: 1px solid #222; padding-top: 10px; }

        /* Carousel */
        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 15px 0; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .thumb-wrap { position: relative; width: 110px; height: 62px; border-radius: 10px; overflow: hidden; border: 2.5px solid transparent; background: #000; flex-shrink: 0; }
        .selected .thumb-wrap { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icons = {
            Back: () => <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
            Export: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
            Import: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
            Edit: () => <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Fire: () => <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c0 0-3.5 3.5-3.5 7.5s3.5 5.5 3.5 5.5s3.5-1.5 3.5-5.5S12 2 12 2z"/><path d="M12 22c3.866 0 7-3.134 7-7c0-1.5-.5-2.5-1.5-3.5c0 3-2 4.5-3.5 5.5s-2 2.5-2 5s.5 4 2 5z" opacity="0.5"/></svg>
        };

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            
            const [selectedId, setSelectedId] = useState(null);
            const [inspecting, setInspecting] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [editItem, setEditItem] = useState(null);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [paused, setPaused] = useState(false);
            const accumRef = useRef(0);

            const todayKey = getLocalDateKey();
            const todayMins = hist[todayKey]?.totalMins || 0;

            const streak = useMemo(() => {
                let count = 0; let check = new Date();
                while (true) {
                    const k = getLocalDateKey(check);
                    if ((hist[k]?.totalMins || 0) >= goal) { count++; check.setDate(check.getDate() - 1); }
                    else { if (k === todayKey) { check.setDate(check.getDate() - 1); continue; } break; }
                }
                return count;
            }, [hist, goal, todayKey]);

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
            }, [lib, hist, goal]);

            useEffect(() => {
                let ticker;
                if (view === 'workout' && isPlaying && !paused) {
                    ticker = setInterval(() => {
                        accumRef.current += 1;
                        if (accumRef.current >= 60) {
                            setHist(prev => ({...prev, [todayKey]: { totalMins: (prev[todayKey]?.totalMins || 0) + 1, videos: prev[todayKey]?.videos || "" }}));
                            accumRef.current = 0;
                        }
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [view, isPlaying, paused]);

            const getMeta = (url) => {
                const yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/);
                if (yt) return { type: 'yt', id: yt[1], thumb: `https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg` };
                const ig = url.match(/(?:instagram\.com\/(?:p|reels|reel)\/)([^/?#&]+)/);
                if (ig) return { type: 'ig', id: ig[1], thumb: `https://images.weserv.nl/?url=www.instagram.com/p/${ig[1]}/media/?size=m` };
                return { type: 'web', id: null, thumb: 'https://placehold.co/100x60/222/ff9900?text=VIDEO' };
            };

            return (
                <div className="container">
                    <header className="header-box">
                        <h1 className="app-title">DAILY20</h1>
                        <span className="v-tag">VERSION 66.0</span>
                    </header>

                    {view === 'home' && (
                        <>
                            <div className="card">
                                <label>Training Goal (Minutes)</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60].map(g => <option key={g} value={g}>{g}</option>)}
                                </select>
                                
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id === selectedId ? null : v.id)}>
                                            <div className="thumb-wrap">
                                                <img src={getMeta(v.url).thumb} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                                <div style={{position:'absolute', bottom:2, right:2, fontSize:9, background:'rgba(0,0,0,0.8)', padding:'2px 4px', borderRadius:3}}>
                                                    {Math.floor(v.durSec/60)}m
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button onClick={() => {
                                    if (lib.length === 0) return alert('Add videos to the library first!');
                                    let pool = [...lib].sort(() => 0.5 - Math.random());
                                    if (selectedId) pool = [lib.find(x => x.id === selectedId), ...pool.filter(x => x.id !== selectedId)];
                                    const plan = pool.slice(0, 3);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec });
                                    setIsPlaying(true); setView('workout');
                                }}>Start Training</button>

                                <div className="btn-row" style={{marginTop:12}}>
                                    <button className="btn-sec" onClick={() => setInspecting({key: todayKey, date: 'Today', m: todayMins, txt: ''})}>Log Manual</button>
                                    <button className="btn-sec" onClick={() => setView('lib')}>Library</button>
                                </div>
                            </div>

                            <div className="card">
                                <div style={{textAlign:'center', fontSize:28, fontWeight:900}}>{Math.floor(todayMins)} <small style={{color:'var(--dim)', fontSize:14}}>/ {goal}m</small></div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const m = hist[k]?.totalMins || 0;
                                        return (
                                            <div key={k} className={`cal-day ${m >= goal ? 'done' : ''}`} onClick={() => setInspecting({key: k, date: d.toDateString(), m, txt: hist[k]?.videos || ""})}>
                                                {d.getDate()}
                                            </div>
                                        );
                                    })}
                                </div>
                                {streak > 0 && <div className="streak-footer"><Icons.Fire /> {streak} Day Streak</div>}
                            </div>
                        </>
                    )}

                    {view === 'lib' && (
                        <main style={{height: '100%', display: 'flex', flexDirection: 'column'}}>
                            <div className="btn-row">
                                <button className="btn-sec btn-icon" onClick={() => setView('home')}><Icons.Back /></button>
                                <button className="btn-sec"><Icons.Export /> Export</button>
                                <button className="btn-sec"><Icons.Import /> Import</button>
                            </div>
                            <div className="card" style={{flex: 1, overflowY: 'auto', marginBottom: 12}}>
                                <h3 style={{margin: '0 0 10px 0'}}>Video Library</h3>
                                {lib.map(v => (
                                    <div key={v.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 0', borderBottom:'1px solid #333'}}>
                                        <img src={getMeta(v.url).thumb} style={{width:60, height:34, objectFit:'cover', borderRadius:5}} />
                                        <div style={{flex:1, fontSize:13, fontWeight:700}}>{v.title}</div>
                                        <button className="btn-sec btn-icon" style={{width:30, height:30, padding:0}} onClick={() => setEditItem(v)}><Icons.Edit /></button>
                                    </div>
                                ))}
                                {lib.length === 0 && <div style={{color:'var(--dim)', fontSize:13, marginTop:10}}>Library is empty.</div>}
                            </div>
                            <button onClick={() => setShowAdd(true)}>+ Add New Video</button>
                        </main>
                    )}

                    {view === 'workout' && (
                        <div className="workout-ui">
                            <div className="player-frame">
                                {getMeta(workout.plan[workout.idx].url).type === 'yt' ? (
                                    <iframe src={`https://www.youtube.com/embed/${getMeta(workout.plan[workout.idx].url).id}?autoplay=1&controls=1&modestbranding=1&rel=0`} allow="autoplay"></iframe>
                                ) : (
                                    <iframe src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowFullScreen></iframe>
                                )}
                            </div>
                            <div className="workout-footer">
                                <div className="timer-display">
                                    {Math.floor(workout.secondsLeft/60)}:{(workout.secondsLeft%60).toString().padStart(2,'0')}
                                </div>
                                <h3 style={{margin:'0 0 15px 0', fontSize:18, fontWeight:700}}>{workout.plan[workout.idx].title}</h3>
                                <div className="btn-row">
                                    <button onClick={() => setPaused(!paused)}>{paused ? '▶ Resume' : '⏸ Pause'}</button>
                                    <button className="btn-sec" onClick={() => {
                                        if (workout.idx + 1 < workout.plan.length) {
                                            const nxt = workout.idx + 1;
                                            setWorkout({...workout, idx: nxt, secondsLeft: workout.plan[nxt].durSec});
                                        } else { setView('home'); }
                                    }}>Skip</button>
                                </div>
                                <button className="btn-sec" style={{marginTop:10, width:'100%'}} onClick={() => setView('home')}>Exit Workout</button>
                            </div>
                        </div>
                    )}

                    {/* Modals */}
                    {showAdd && (
                        <div className="overlay" onClick={() => setShowAdd(false)}>
                            <div className="card" style={{width:'90%', maxWidth:350}} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>Add New Video</h3>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const f = new FormData(e.target);
                                    const durParts = f.get('d').split(':');
                                    const totalSeconds = (parseInt(durParts[0]) * 60) + (parseInt(durParts[1]) || 0);
                                    setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), durSec: totalSeconds }, ...lib]);
                                    setShowAdd(false);
                                }}>
                                    <label>Video Title</label>
                                    <input name="t" required placeholder="Morning Yoga" />
                                    <label>URL (YouTube/Instagram)</label>
                                    <input name="u" required />
                                    <label>Duration (Min:Sec)</label>
                                    <input name="d" required placeholder="15:00" />
                                    <div className="btn-row" style={{marginTop:10}}>
                                        <button type="submit">Save Video</button>
                                        <button type="button" className="btn-sec" onClick={() => setShowAdd(false)}>Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {editItem && (
                        <div className="overlay" onClick={() => setEditItem(null)}>
                            <div className="card" style={{width:'90%', maxWidth:350}} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>Edit Video</h3>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const f = new FormData(e.target);
                                    const durParts = f.get('d').split(':');
                                    const totalSeconds = (parseInt(durParts[0]) * 60) + (parseInt(durParts[1]) || 0);
                                    setLib(lib.map(x => x.id === editItem.id ? { ...x, title: f.get('t'), url: f.get('u'), durSec: totalSeconds } : x));
                                    setEditItem(null);
                                }}>
                                    <label>Title</label>
                                    <input name="t" defaultValue={editItem.title} required />
                                    <label>URL</label>
                                    <input name="u" defaultValue={editItem.url} required />
                                    <label>Duration (Min:Sec)</label>
                                    <input name="d" defaultValue={`${Math.floor(editItem.durSec/60)}:${(editItem.durSec%60).toString().padStart(2,'0')}`} required />
                                    <div className="btn-row" style={{marginTop:10}}>
                                        <button type="submit">Save</button>
                                        <button type="button" className="btn-sec" style={{background: 'var(--danger)'}} onClick={() => {
                                            setLib(lib.filter(x => x.id !== editItem.id));
                                            setEditItem(null);
                                        }}>Delete</button>
                                    </div>
                                    <button type="button" className="btn-sec" style={{width:'100%', marginTop: 0}} onClick={() => setEditItem(null)}>Cancel</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {inspecting && (
                        <div className="overlay" onClick={() => setInspecting(null)}>
                            <div className="card" style={{width:'90%', maxWidth:350}} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>{inspecting.date}</h3>
                                <label>Minutes Trained</label>
                                <input type="number" value={inspecting.m} onChange={e => setInspecting({...inspecting, m: parseInt(e.target.value)||0})} />
                                <label>Activity Details</label>
                                <textarea rows="3" value={inspecting.txt} onChange={e => setInspecting({...inspecting, txt: e.target.value})} placeholder="Running, Lifting, etc." />
                                <div className="btn-row" style={{marginTop:15}}>
                                    <button onClick={() => {
                                        setHist({...hist, [inspecting.key]: {totalMins: inspecting.m, videos: inspecting.txt}});
                                        setInspecting(null);
                                    }}>Save History</button>
                                    <button className="btn-sec" onClick={() => setInspecting(null)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
