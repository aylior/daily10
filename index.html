        };

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

            const [view, setView] = useState('home');

            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            
            const [selectedId, setSelectedId] = useState(null);
            const [offlineLog, setOfflineLog] = useState(false);
            const [inspecting, setInspecting] = useState(null);
            const [showSplash, setShowSplash] = useState(false);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [paused, setPaused] = useState(false);
            const playerRef = useRef(null);
            const accumRef = useRef(0);

            const todayKey = getLocalDateKey();
            const todayMins = hist[todayKey]?.totalMins || 0;

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
                
                if (todayMins >= goal && !localStorage.getItem(`splash_${todayKey}`)) {
                    setShowSplash(true);
                    localStorage.setItem(`splash_${todayKey}`, 'true');
                }
            }, [lib, hist, goal]);

            useEffect(() => {
                let ticker;
                if (view === 'workout' && isPlaying && !paused) {
                    ticker = setInterval(() => {
                        accumRef.current += 1;
                        if (accumRef.current >= 60) {
                            addMins(1);
                            accumRef.current = 0;
                        }
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [view, isPlaying, paused]);

            const addMins = (m, title = "") => {
                setHist(prev => {
                    const ex = prev[todayKey] || { totalMins: 0, videos: "" };
                    const newList = title && !ex.videos.includes(title) ? (ex.videos + (ex.videos ? "||" : "") + title) : ex.videos;
                    return { ...prev, [todayKey]: { totalMins: ex.totalMins + m, videos: newList }};
                });
            };

                return { type: 'web', id: null, thumb: 'https://placehold.co/100x60/222/ff9900?text=Video' };
            };

                            <button className="btn-sec" style={{background:'#000', color: '#fff'}}>Continue</button>
                        </div>

                            <div className="card">
                                <label>Target Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id === selectedId ? null : v.id)}>
                                            <div className="thumb-wrap">
                                                <img src={getMeta(v.url).thumb} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                                <div className="dur-badge">{Math.floor(v.durSec/60)}m</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button style={{marginTop:10}} disabled={lib.length === 0} onClick={() => {
                                    let pool = [...lib].sort(() => 0.5 - Math.random());
                                    if (selectedId) pool = [lib.find(x => x.id === selectedId), ...pool.filter(x => x.id !== selectedId)];
                                    const plan = pool.slice(0, 3);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec });
                                    accumRef.current = 0; setView('workout');
                                }}>Start Workout</button>

                                <div className="btn-row" style={{marginTop:12}}>
                                    <button className="btn-sec" onClick={() => setOfflineLog(true)}>Offline Training</button>
                                    <button className="btn-sec" onClick={() => setView('lib')}>Library</button>
                                </div>
                            </div>

                            <div className="card">
                                <div style={{textAlign:'center', fontSize:28, fontWeight:900, marginBottom:10}}>{Math.floor(todayMins)}m / {goal}m</div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const m = hist[k]?.totalMins || 0;
                                        return (
                                            <div key={k} className={`cal-day ${m >= goal ? 'done' : ''}`} onClick={() => setInspecting({key: k, date: d.toDateString(), m, txt: hist[k]?.videos || ""})}>
                                                {d.getDate()}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'lib' && (
                        <main>
                            <div className="btn-row">
                                <button className="btn-sec btn-icon" onClick={() => setView('home')}><Icons.Back /></button>
                                <button className="btn-sec" onClick={() => {/*Export Logic*/}}><Icons.Export /> Export</button>
                                <button className="btn-sec"><Icons.Import /> Import</button>
                            </div>
                            <div className="card">
                                <h3 style={{margin:0}}>Video Library</h3>
                                {lib.map(v => (
                                    <div key={v.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 0', borderBottom:'1px solid #333'}}>
                                        <img src={getMeta(v.url).thumb} style={{width:60, borderRadius:5}} />
                                        <div style={{flex:1, fontSize:13}}>{v.title}</div>
                                        <button className="btn-sec btn-icon" style={{width:30, height:30}}><Icons.Edit /></button>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => {/*Add logic*/}}>+ Add New Video</button>
                        </main>
                    )}

                    {view === 'workout' && (
                        <div className="workout-ui">
                            <div className="player-container">
                                {getMeta(workout.plan[workout.idx].url).type === 'yt' ? (
                                    <iframe src={`https://www.youtube.com/embed/${getMeta(workout.plan[workout.idx].url).id}?autoplay=1&controls=1`} allow="autoplay"></iframe>
                                ) : (
                                    <iframe src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowFullScreen></iframe>
                                )}
                            </div>
                            <div className="controls-area">
                                <div style={{fontSize:60, fontWeight:900, color: 'var(--neon)'}}>
                                    {Math.floor(workout.secondsLeft/60)}:{(workout.secondsLeft%60).toString().padStart(2,'0')}
                                </div>
                                <h2 style={{margin:'10px 0'}}>{workout.plan[workout.idx].title}</h2>
                                <div className="btn-row" style={{padding:'0 20px'}}>
                                    <button onClick={() => setPaused(!paused)}>{paused ? 'Resume' : 'Pause'}</button>
                                    <button className="btn-sec" onClick={() => {
                                        if (workout.idx + 1 < workout.plan.length) {
                                            const nxt = workout.idx + 1;
                                            setWorkout({...workout, idx: nxt, secondsLeft: workout.plan[nxt].durSec});
                                        } else { setView('home'); }
                                    }}>Skip</button>
                                </div>
                                <button className="btn-sec" style={{marginTop:20, alignSelf:'center'}} onClick={() => setView('home')}>Exit</button>
                            </div>
                        </div>
                    )}

                    {offlineLog && (
                        <div className="overlay" onClick={() => setOfflineLog(false)}>
                            <div className="card modal" onClick={e => e.stopPropagation()}>
                                <h3>Offline Training</h3>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const f = new FormData(e.target);
                                    addMins(parseInt(f.get('m')), f.get('a'));
                                    setOfflineLog(false);
                                }}>
                                    <label>Activity</label>
                                    <input name="a" required placeholder="Running, Yoga..." />
                                    <label>Minutes</label>
                                    <input type="number" name="m" required />
                                    <button type="submit">Log Minutes</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {inspecting && (
                        <div className="overlay" onClick={() => setInspecting(null)}>
                            <div className="card modal" onClick={e => e.stopPropagation()}>
                                <h3>{inspecting.date}</h3>
                                <label>Training Minutes</label>
                                <input type="number" value={inspecting.m} onChange={e => setInspecting({...inspecting, m: parseInt(e.target.value)||0})} />
                                <label>Activities (use || to separate)</label>
                                <textarea rows="4" value={inspecting.txt} onChange={e => setInspecting({...inspecting, txt: e.target.value})} />
                                <div className="btn-row">
                                    <button onClick={() => {
                                        setHist({...hist, [inspecting.key]: {totalMins: inspecting.m, videos: inspecting.txt}});
                                        setInspecting(null);
                                    }}>Save History</button>
                                    <button className="btn-sec" onClick={() => setInspecting(null)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            
            const [search, setSearch] = useState("");
            const [selectedId, setSelectedId] = useState(null);
            const [editing, setEditing] = useState(null);
            const [inspecting, setInspecting] = useState(null);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [paused, setPaused] = useState(false);
            const playerRef = useRef(null);
            const accumRef = useRef(0);

            const todayKey = getLocalDateKey();
            const todayMins = hist[todayKey]?.totalMins || 0;
            const progress = Math.min(100, (todayMins / goal) * 100);

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
            }, [lib, hist, goal]);

            useEffect(() => {
                let ticker;
                if (view === 'workout' && isPlaying && !paused) {
                    ticker = setInterval(() => {
                        accumRef.current += 1;
                        if (accumRef.current >= 60) {
                            updateDayMinutes(todayKey, (hist[todayKey]?.totalMins || 0) + 1);
                            accumRef.current = 0;
                        }
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [view, isPlaying, paused]);

            const updateDayMinutes = (key, val) => {
                setHist(prev => ({ ...prev, [key]: { ...prev[key], totalMins: val } }));
            };

            const handleNext = () => {
                if (workout.idx + 1 < workout.plan.length) {
                    const nxt = workout.idx + 1;
                    const v = workout.plan[nxt];
                    setWorkout({ ...workout, idx: nxt, secondsLeft: v.durSec - (v.startSec || 0) });
                } else { setView('home'); }
            };

            useEffect(() => {
                if (view === 'workout') {
                    const v = workout.plan[workout.idx];
                    const meta = getMeta(v.url);
                    if (meta.type === 'yt') {
                        if (playerRef.current?.destroy) playerRef.current.destroy();
                        playerRef.current = new window.YT.Player('yt-player', {
                            videoId: meta.id,
                            playerVars: { autoplay: 1, start: v.startSec || 0, controls: 1, rel: 0, modestbranding: 1 },
                            events: { onStateChange: (e) => setIsPlaying(e.data === 1) }
                        });
                    } else { setIsPlaying(true); }
                }
            }, [view, workout.idx]);

            const filteredLib = useMemo(() => 
                lib.filter(v => v.title.toLowerCase().includes(search.toLowerCase())), [lib, search]);

            return (
                <div className="container">
                    <header className="header-box">
                        <h1 className="app-title">DAILY20</h1>
                        <span className="v-tag">VERSION 59.0</span>
                    </header>

                    {view === 'home' && (
                        <main>
                            <div className="card">
                                <label>Target Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60, 90].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                
                                <label>Pick for Session</label>
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(v.id === selectedId ? null : v.id)}>
                                            <div className="thumb-wrap">
                                                <img className="carousel-thumb" src={getMeta(v.url).thumb} />
                                                <div className="dur-badge">{fromSec(v.durSec - (v.startSec || 0))}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button style={{marginTop:15}} disabled={lib.length === 0} onClick={() => {
                                    let pool = [...lib].sort(() => 0.5 - Math.random());
                                    if (selectedId) pool = [lib.find(x => x.id === selectedId), ...pool.filter(x => x.id !== selectedId)];
                                    const plan = pool.slice(0, 4);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec - (plan[0].startSec || 0) });
                                    accumRef.current = 0; setView('workout');
                                }}>Start Training</button>
                                
                                <div className="progress-bg"><div className="progress-fill" style={{width: `${progress}%`}}></div></div>
                                
                                <div className="btn-row">
                                    <button className="btn-sec" onClick={() => setView('lib')}>Library</button>
                                    <button className="btn-sec" onClick={() => {
                                        const key = getLocalDateKey();
                                        setInspecting({ key, date: new Date().toDateString(), editMins: hist[key]?.totalMins || 0 });
                                    }}>Calendar</button>
                                </div>
                            </div>

                            <div className="card" style={{textAlign:'center'}}>
                                <div style={{fontSize:32, fontWeight:900}}>{Math.floor(todayMins)} <span style={{fontSize:16, color:'var(--dim)'}}>/ {goal}m</span></div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const m = hist[k]?.totalMins || 0;
                                        return (
                                            <div key={k} className={`cal-day ${m >= goal ? 'done' : ''} ${k === todayKey ? 'today' : ''}`} onClick={() => setInspecting({key: k, date: d.toDateString(), editMins: m})}>
                                                {d.getDate()}<b style={{fontSize:8}}>{Math.floor(m)}m</b>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'lib' && (
                        <main>
                            <div className="btn-row">
                                <button className="btn-sec btn-icon" onClick={() => setView('home')}><Icons.Back /></button>
                                <button className="btn-sec" onClick={() => {
                                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({ lib, hist, goal })], { type: 'application/json' }));
                                    a.download = `Daily20_Backup.json`; a.click();
                                }}><Icons.Export /> Export</button>
                                <button className="btn-sec" style={{position:'relative'}}>
                                    <Icons.Import /> Import <input type="file" onChange={e => {
                                        const reader = new FileReader();
                                        reader.onload = (ev) => {
                                            const d = JSON.parse(ev.target.result);
                                            if (d.lib) setLib(d.lib); if (d.hist) setHist(d.hist);
                                        }; reader.readAsText(e.target.files[0]);
                                    }} style={{position:'absolute', inset:0, opacity:0}} />
                                </button>
                            </div>

                            <input className="search-input" placeholder="Search library..." value={search} onChange={e => setSearch(e.target.value)} />

                            <form className="card" onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), durSec: toSec(f.get('d')), startSec: toSec(f.get('s')) }, ...lib]);
                                e.target.reset();
                            }}>
                                <label>New Video</label>
                                <input name="t" required placeholder="Title" />
                                <input name="u" required placeholder="URL" />
                                <div className="btn-row">
                                    <input name="s" placeholder="Start (0:00)" />
                                    <input name="d" required placeholder="End (m:s)" />
                                </div>
                                <button type="submit">Add to Library</button>
                            </form>

                            <div className="card">
                                {filteredLib.map(v => (
                                    <div key={v.id} className="lib-item">
                                        <img src={getMeta(v.url).thumb} className="list-thumb" />
                                        <div className="lib-info">
                                            <div className="lib-title">{v.title}</div>
                                            <div className="lib-dur" style={{fontSize:10, color:'var(--dim)'}}>{fromSec(v.durSec - (v.startSec || 0))}</div>
                                        </div>
                                        <button className="btn-sec btn-icon" onClick={() => setEditing({...v, sStr: fromSec(v.startSec || 0), dStr: fromSec(v.durSec)})}><Icons.Edit /></button>
                                        <button className="btn-danger btn-icon" onClick={() => setLib(lib.filter(x => x.id !== v.id))}><Icons.Delete /></button>
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {view === 'workout' && (
                        <main className="workout-layout">
                            <div className="player-frame">
                                {getMeta(workout.plan[workout.idx].url).type === 'yt' ? (
                                    <div id="yt-player"></div>
                                ) : (
                                    <iframe src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowFullScreen></iframe>
                                )}
                            </div>
                            <div className="workout-controls">
                                <div style={{textAlign:'center'}}>
                                    <div style={{fontSize:58, fontWeight:900, color:'var(--neon)', lineHeight:1}}>{fromSec(workout.secondsLeft)}</div>
                                    <h2 style={{margin:'15px 0', fontSize:18}}>{workout.plan[workout.idx].title}</h2>
                                </div>
                                <div>
                                    <div className="btn-row">
                                        <button onClick={() => setPaused(!paused)}>{paused ? '▶ Resume' : '⏸ Pause'}</button>
                                        <button className="btn-sec" onClick={handleNext}>⏭ Skip</button>
                                    </div>
                                    <button className="btn-sec" style={{marginTop:10}} onClick={() => { if(playerRef.current?.destroy) playerRef.current.destroy(); setView('home'); }}>🚪 Exit Workout</button>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* MODALS */}
                    {inspecting && (
                        <div className="overlay" onClick={() => setInspecting(null)}>
                            <div className="card modal-big" onClick={e => e.stopPropagation()}>
                                <h2 style={{marginTop:0, color:'var(--neon)'}}>{inspecting.date}</h2>
                                
                                <div className="history-editor">
                                    <label>Total Training Minutes</label>
                                    <input type="number" value={inspecting.editMins} onChange={e => setInspecting({...inspecting, editMins: parseInt(e.target.value) || 0})} />
                                    <p style={{fontSize:11, color:'var(--dim)'}}>Manual overrides allow you to correct tracking errors or add offline work.</p>
                                </div>

                                <label>Logged Activities</label>
                                <div style={{background:'#000', padding:10, borderRadius:8, fontSize:13, minHeight:60, marginBottom:20}}>
                                    {hist[inspecting.key]?.videos?.split('||').map((v, i) => <div key={i} style={{padding:'4px 0', borderBottom:'1px solid #222'}}>🔥 {v}</div>) || "No activity names logged."}
                                </div>

                                <div className="btn-row">
                                    <button onClick={() => { updateDayMinutes(inspecting.key, inspecting.editMins); setInspecting(null); }}>💾 Save Changes</button>
                                    <button className="btn-sec" onClick={() => setInspecting(null)}>Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editing && (
                        <div className="overlay">
                            <div className="card modal-big">
                                <h3>Edit Video Details</h3>
                                <label>Title</label>
                                <input value={editing.title} onChange={e => setEditing({...editing, title: e.target.value})} />
                                <label>URL</label>
                                <input value={editing.url} onChange={e => setEditing({...editing, url: e.target.value})} />
                                <div className="btn-row">
                                    <div style={{flex:1}}><label>Start</label><input value={editing.sStr} onChange={e => setEditing({...editing, sStr: e.target.value})} /></div>
                                    <div style={{flex:1}}><label>End</label><input value={editing.dStr} onChange={e => setEditing({...editing, dStr: e.target.value})} /></div>
                                </div>
                                <button style={{marginTop:10}} onClick={() => {
                                    setLib(lib.map(x => x.id === editing.id ? { ...editing, startSec: toSec(editing.sStr), durSec: toSec(editing.dStr) } : x));
                                    setEditing(null);
                                }}>Save Changes</button>
                                <button className="btn-sec" style={{marginTop:10}} onClick={() => setEditing(null)}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
