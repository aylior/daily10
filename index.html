<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v29</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --info: #3498db; --warning: #f39c12; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #333; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sec { background: #333; color: white; margin-top: 8px; }
        
        .daily-stat { background: #1e1e1e; border-radius: 16px; padding: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #333; }
        .progress-container { background: #333; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--neon); transition: width 0.5s ease; box-shadow: 0 0 10px var(--neon); }

        .player-wrapper { width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid #333; margin-bottom: 8px; position: relative; }
        .ratio-yt { aspect-ratio: 16/9; }
        .ratio-insta { aspect-ratio: 9/16; max-height: 50vh; }
        #yt-player, .insta-player { width: 100%; height: 100%; border: 0; display: block; }

        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; margin-bottom: 15px; scrollbar-width: none; }
        .carousel-item { flex: 0 0 100px; text-align: center; }
        .carousel-thumb { width: 100px; height: 60px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; }
        .selected .carousel-thumb { border-color: var(--neon); transform: scale(1.05); }

        .lib-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .lib-info { flex-grow: 1; padding: 0 12px; overflow: hidden; }
        .lib-title { font-size: 14px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // DATA RECOVERY WRAPPER
            const safeLoad = (key, fallback) => {
                try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch(e) { return fallback; }
            };

            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => safeLoad('d20_v29_lib', []));
            const [hist, setHist] = useState(() => safeLoad('d20_v29_hist', {}));
            const [goal, setGoal] = useState(() => parseInt(safeLoad('d20_v29_goal', 20)));
            
            const [selectedId, setSelectedId] = useState(null);
            const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [timerOverride, setTimerOverride] = useState(false);
            const playerRef = useRef(null);

            const todayKey = new Date().toISOString().split('T')[0];
            const todayMins = hist[todayKey]?.totalMins || 0;
            const progress = Math.min((todayMins / goal) * 100, 100);

            useEffect(() => {
                localStorage.setItem('d20_v29_lib', JSON.stringify(lib));
                localStorage.setItem('d20_v29_hist', JSON.stringify(hist));
                localStorage.setItem('d20_v29_goal', goal);
            }, [lib, hist, goal]);

            const getYTID = (u) => u?.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            const isInsta = (u) => u?.includes('instagram.com');
            const getThumb = (v) => isInsta(v.url) ? 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg' : `https://img.youtube.com/vi/${getYTID(v.url)}/mqdefault.jpg`;
            
            // Timer Calculation: (Total Mins * 60) - Start Offset
            const getSegmentSecs = (v) => Math.max(0, (parseInt(v.dur) * 60) - parseInt(v.start || 0));

            const creditVideo = (vid) => {
                const mins = Math.max(1, Math.ceil(getSegmentSecs(vid) / 60));
                const day = hist[todayKey] || { complete: true, videos: "", totalMins: 0 };
                setHist(prev => ({
                    ...prev,
                    [todayKey]: {
                        ...day,
                        videos: (day.videos ? day.videos + ", " : "") + vid.title,
                        totalMins: day.totalMins + mins
                    }
                }));
            };

            const cleanupPlayer = () => {
                if (playerRef.current && playerRef.current.destroy) {
                    playerRef.current.destroy();
                    playerRef.current = null;
                }
                setIsPlaying(false);
            };

            const handleSkip = () => {
                const currentVid = workout.plan[workout.idx];
                if (currentVid) creditVideo(currentVid);

                if (workout.idx < workout.plan.length - 1) {
                    const nextIdx = workout.idx + 1;
                    const nextVid = workout.plan[nextIdx];
                    setWorkout(prev => ({ ...prev, idx: nextIdx, seconds: getSegmentSecs(nextVid) }));
                    setTimerOverride(false);
                } else {
                    cleanupPlayer();
                    setView('home');
                }
            };

            // Master Timer
            useEffect(() => {
                let timer;
                if (view === 'workout' && isPlaying && !timerOverride && workout.seconds > 0) {
                    timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
                } else if (view === 'workout' && workout.seconds <= 0 && isPlaying) {
                    handleSkip();
                }
                return () => clearInterval(timer);
            }, [view, isPlaying, timerOverride, workout.seconds]);

            // Video Loader
            useEffect(() => {
                if (view === 'workout' && workout.plan[workout.idx]) {
                    const vid = workout.plan[workout.idx];
                    if (!isInsta(vid.url)) {
                        const initYT = () => {
                            cleanupPlayer();
                            playerRef.current = new window.YT.Player('yt-player', {
                                videoId: getYTID(vid.url),
                                playerVars: { 'autoplay': 1, 'start': vid.start, 'playsinline': 1, 'controls': 1 },
                                events: { 'onStateChange': (e) => setIsPlaying(e.data === 1) }
                            });
                        };
                        window.YT && window.YT.Player ? initYT() : setTimeout(initYT, 1000);
                    } else { setIsPlaying(true); }
                } else if (view === 'workout' && !workout.plan[workout.idx]) {
                    // Safety redirect if state gets lost
                    setView('home');
                }
            }, [view, workout.idx]);

            return (
                <div className="container">
                    <header style={{textAlign:'center', padding:'10px 0'}}>
                        <h1 style={{color:'var(--neon)', margin:0, letterSpacing:'2px'}} onClick={() => {cleanupPlayer(); setView('home');}}>DAILY20</h1>
                    </header>

                    {view === 'home' && (
                        <main>
                            <div className="daily-stat">
                                <small style={{color:'var(--dim)', fontWeight:'bold'}}>PROGRESS</small>
                                <div style={{fontSize:'34px', fontWeight:'900', margin:'5px 0'}}>
                                    <span style={{color:'var(--neon)'}}>{todayMins}</span> / {goal} <small style={{fontSize:'14px', color:'var(--dim)'}}>MINS</small>
                                </div>
                                <div className="progress-container"><div className="progress-bar" style={{width: `${progress}%`}}></div></div>
                                <div style={{display:'flex', justifyContent:'center', gap:'10px'}}>
                                    {[20, 40, 60].map(g => (
                                        <button key={g} onClick={() => setGoal(g)} style={{padding:'6px 12px', fontSize:'12px', background: goal === g ? 'var(--neon)' : '#2a2a2a', color: goal === g ? 'black' : 'white', width:'auto'}}>{g}m</button>
                                    ))}
                                </div>
                            </div>

                            <div className="card">
                                <div className="carousel">
                                    {lib.map(v => (
                                        <div key={v.id} className={`carousel-item ${selectedId === v.id ? 'selected' : ''}`} onClick={() => setSelectedId(selectedId === v.id ? null : v.id)}>
                                            <img className="carousel-thumb" src={getThumb(v)} />
                                            <div style={{fontSize:'10px', marginTop:'5px', color:selectedId === v.id ? 'var(--neon)' : 'white', whiteSpace:'nowrap', overflow:'hidden'}}>{v.title}</div>
                                        </div>
                                    ))}
                                </div>
                                <button disabled={lib.length === 0} onClick={() => {
                                    const pool = selectedId ? [lib.find(v => v.id === selectedId), ...lib.filter(v => v.id !== selectedId)] : [...lib].sort(() => 0.5 - Math.random());
                                    const plan = pool.slice(0, 4);
                                    setWorkout({ plan, idx: 0, seconds: getSegmentSecs(plan[0]) });
                                    setView('workout');
                                }}>Start Workout</button>
                                <button className="btn-sec" onClick={() => setView('lib')}>Library & Settings</button>
                            </div>
                        </main>
                    )}

                    {view === 'lib' && (
                        <main>
                            <div className="card" style={{display:'flex', gap:'10px'}}>
                                <button onClick={() => setView('home')} style={{flex:1}}>← Back</button>
                                <button className="btn-sec" style={{flex:1, margin:0}} onClick={() => {
                                    const blob = new Blob([JSON.stringify({lib, hist, goal})], {type:'application/json'});
                                    const a = document.createElement('a');
                                    a.href = URL.createObjectURL(blob);
                                    a.download = 'daily20_backup.json';
                                    a.click();
                                }}>Export</button>
                            </div>

                            <form className="card" onSubmit={e => {
                                e.preventDefault(); const f = new FormData(e.target);
                                setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d'), start: f.get('s') || 0 }, ...lib]);
                                e.target.reset();
                            }}>
                                <h3 style={{marginTop:0}}>Add Video</h3>
                                <input name="u" placeholder="YouTube/Insta URL" required />
                                <input name="t" placeholder="Video Title" required />
                                <div style={{display:'flex', gap:'10px'}}>
                                    <input name="d" type="number" placeholder="Duration (Mins)" required />
                                    <input name="s" type="number" placeholder="Start (Secs)" />
                                </div>
                                <button type="submit">Save to Library</button>
                            </form>

                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} className="lib-row">
                                        <img src={getThumb(v)} style={{width:'50px', borderRadius:'4px'}} />
                                        <div className="lib-info">
                                            <span className="lib-title">{v.title}</span>
                                            <small style={{color:'var(--dim)'}}>{v.dur}m (Start: {v.start}s)</small>
                                        </div>
                                        <button onClick={() => setLib(lib.filter(x => x.id !== v.id))} style={{background:'var(--danger)', width:'35px', padding:'5px'}}>✕</button>
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {view === 'workout' && workout.plan[workout.idx] && (
                        <main style={{textAlign:'center'}}>
                            <div className={`player-wrapper ${isInsta(workout.plan[workout.idx].url) ? 'ratio-insta' : 'ratio-yt'}`}>
                                {isInsta(workout.plan[workout.idx].url) ? 
                                    <iframe className="insta-player" src={`${workout.plan[workout.idx].url.split('?')[0]}embed`} allowTransparency="true" allowFullScreen></iframe> 
                                    : <div id="yt-player"></div>}
                            </div>
                            
                            <div className="card" style={{marginTop:0}}>
                                <div style={{fontSize:'54px', fontWeight:'900', color: isPlaying ? 'var(--neon)' : 'var(--dim)', fontVariantNumeric:'tabular-nums'}}>
                                    {Math.floor(workout.seconds/60)}:{(workout.seconds%60).toString().padStart(2,'0')}
                                </div>
                                <p style={{fontWeight:'bold', marginBottom:'15px'}}>{workout.plan[workout.idx].title}</p>
                                
                                <button onClick={() => setTimerOverride(!timerOverride)} style={{background: timerOverride ? 'var(--success)' : 'var(--warning)', marginBottom:'10px'}}>
                                    {timerOverride ? 'Resume Timer' : 'Pause Timer'}
                                </button>
                                
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                                    <button className="btn-sec" onClick={handleSkip}>Skip Video</button>
                                    <button className="btn-sec" onClick={() => {cleanupPlayer(); setView('home');}}>End Workout</button>
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
