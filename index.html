<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v56</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; --success: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #333; }
        
        /* Header & Versioning */
        .header-box { text-align: center; margin-bottom: 15px; display: flex; align-items: baseline; justify-content: center; gap: 8px; }
        .app-title { color: var(--neon); margin: 0; font-size: 24px; }
        .v-tag { color: var(--dim); font-size: 10px; font-family: monospace; font-weight: bold; }

        /* Unified Button System */
        .btn-row { display: flex; gap: 8px; margin-bottom: 15px; }
        button { background: var(--neon); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; flex: 1; }
        .btn-sec { background: #333; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-icon-only { width: 40px; height: 40px; flex: none; padding: 0; font-size: 18px; }
        
        /* Inputs */
        label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 4px; font-weight: bold; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }

        /* Progress & Calendar */
        .progress-bg { width: 100%; height: 8px; background: #2a2a2a; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon); transition: width 0.5s ease; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { aspect-ratio: 1; border-radius: 6px; background: #2a2a2a; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid transparent; }
        .cal-day.done { background: var(--neon); color: black; font-weight: bold; }
        .cal-day.today { border-color: var(--neon); }

        /* Library List & Thumbs */
        .lib-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #333; }
        .list-thumb { width: 60px; height: 35px; border-radius: 4px; object-fit: cover; background: #000; }
        
        /* Players */
        .player-frame { width: 100%; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 12px; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const getThumb = (url) => {
            const ytId = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
            return ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : 'https://placehold.co/100x60/1e1e1e/ff9900?text=Video';
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            const [editingVideo, setEditingVideo] = useState(null);
            
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0 });
            const [isPlaying, setIsPlaying] = useState(false);
            const [paused, setPaused] = useState(false);
            const playerRef = useRef(null);
            const lastLogRef = useRef(Date.now());

            const todayKey = getLocalDateKey();
            const todayMins = hist[todayKey]?.totalMins || 0;
            const progressPct = Math.min(100, (todayMins / goal) * 100);

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
            }, [lib, hist, goal]);

            // FIX: Real-time minute tracking
            useEffect(() => {
                let interval;
                if (view === 'workout' && isPlaying && !paused) {
                    interval = setInterval(() => {
                        const now = Date.now();
                        // If 60 seconds of playback passed
                        if (now - lastLogRef.current >= 60000) {
                            tickMinute();
                            lastLogRef.current = now;
                        }
                        setWorkout(w => ({ ...w, secondsLeft: Math.max(0, w.secondsLeft - 1) }));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [view, isPlaying, paused]);

            const tickMinute = () => {
                setHist(prev => {
                    const ex = prev[todayKey] || { totalMins: 0, videos: "" };
                    return { ...prev, [todayKey]: { ...ex, totalMins: ex.totalMins + 1 }};
                });
            };

            const logWorkoutCompletion = (title) => {
                setHist(prev => {
                    const ex = prev[todayKey] || { totalMins: 0, videos: "" };
                    const videoLog = ex.videos.includes(title) ? ex.videos : (ex.videos + (ex.videos ? ", " : "") + title);
                    return { ...prev, [todayKey]: { ...ex, videos: videoLog }};
                });
            };

            const handleNext = () => {
                logWorkoutCompletion(workout.plan[workout.idx].title);
                if (workout.idx + 1 < workout.plan.length) {
                    const nxt = workout.idx + 1;
                    const v = workout.plan[nxt];
                    setWorkout({ ...workout, idx: nxt, secondsLeft: v.durSec - (v.startSec || 0) });
                } else {
                    setView('home');
                }
            };

            // FIX: Instagram & YouTube Player Logic
            useEffect(() => {
                if (view === 'workout') {
                    const v = workout.plan[workout.idx];
                    const ytId = v.url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^&?\s]{11})/)?.[1];
                    
                    if (ytId) {
                        if (playerRef.current?.destroy) playerRef.current.destroy();
                        playerRef.current = new window.YT.Player('yt-player', {
                            videoId: ytId,
                            playerVars: { autoplay: 1, start: v.startSec || 0, controls: 1 },
                            events: { onStateChange: (e) => setIsPlaying(e.data === 1) }
                        });
                    } else {
                        // For Instagram or other links, use raw iframe
                        setIsPlaying(true); 
                    }
                }
            }, [view, workout.idx]);

            const exportData = () => {
                const blob = new Blob([JSON.stringify({ lib, hist, goal })], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = `Daily20_Backup.json`;
                a.click();
            };

            const importData = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const d = JSON.parse(ev.target.result);
                    if (d.lib) setLib(d.lib); if (d.hist) setHist(d.hist);
                    alert("Imported!");
                };
                reader.readAsText(e.target.files[0]);
            };

            return (
                <div className="container">
                    <header className="header-box">
                        <h1 className="app-title">DAILY20</h1>
                        <span className="v-tag">v56</span>
                    </header>

                    {view === 'home' && (
                        <main>
                            <div className="card">
                                <label>Target Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 60].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                <button disabled={lib.length === 0} onClick={() => {
                                    const plan = [...lib].sort(() => 0.5 - Math.random()).slice(0, 3);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec - (plan[0].startSec || 0) });
                                    lastLogRef.current = Date.now();
                                    setView('workout');
                                }}>⚡ Start Random Session</button>
                                <div className="progress-bg"><div className="progress-fill" style={{width: `${progressPct}%`}}></div></div>
                                <div className="btn-row" style={{marginTop:10}}>
                                    <button className="btn-sec" onClick={() => setView('lib')}>📚 Library</button>
                                    <button className="btn-sec" onClick={() => alert("Offline logging uses the same minute tracking logic.")}>+ Manual</button>
                                </div>
                            </div>

                            <div className="card">
                                <div style={{textAlign:'center', fontSize:24, fontWeight:900}}>{Math.floor(todayMins)} <small style={{fontSize:12, color:'var(--dim)'}}>/ {goal}m</small></div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const m = hist[k]?.totalMins || 0;
                                        return (
                                            <div key={k} className={`cal-day ${m >= goal ? 'done' : ''} ${k === todayKey ? 'today' : ''}`}>
                                                {d.getDate()}
                                                <b style={{fontSize:7}}>{Math.floor(m)}m</b>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'lib' && (
                        <main>
                            <div className="btn-row">
                                <button className="btn-sec btn-icon-only" onClick={() => setView('home')}>🔙</button>
                                <button className="btn-sec" onClick={exportData}>📤 Export</button>
                                <button className="btn-sec" style={{position:'relative'}}>
                                    📥 Import <input type="file" onChange={importData} style={{position:'absolute', inset:0, opacity:0}} />
                                </button>
                            </div>

                            <form className="card" onSubmit={e => {
                                e.preventDefault();
                                const f = new FormData(e.target);
                                const toS = (str) => { const p = str.split(':'); return p.length > 1 ? (parseInt(p[0])*60)+parseInt(p[1]) : parseInt(str) || 0; };
                                const newItem = { id: Date.now(), title: f.get('t'), url: f.get('u'), durSec: toS(f.get('d')), startSec: toS(f.get('s')) };
                                setLib([newItem, ...lib]);
                                e.target.reset();
                            }}>
                                <label>Add New Video</label>
                                <input name="t" required placeholder="Title" />
                                <input name="u" required placeholder="YouTube or Instagram URL" />
                                <div className="btn-row">
                                    <input name="s" placeholder="Start (0:00)" />
                                    <input name="d" required placeholder="End (m:s)" />
                                </div>
                                <button type="submit">➕ Add to Library</button>
                            </form>

                            <div className="card">
                                {lib.map(v => (
                                    <div key={v.id} className="lib-item">
                                        <img src={getThumb(v.url)} className="list-thumb" />
                                        <div style={{flex:1, fontSize:13, fontWeight:'bold'}}>{v.title}</div>
                                        <button className="btn-sec btn-icon-only" onClick={() => setEditingVideo(v)}>✏️</button>
                                        <button className="btn-danger btn-icon-only" onClick={() => setLib(lib.filter(x => x.id !== v.id))}>🗑️</button>
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {view === 'workout' && (
                        <main>
                            <div className="player-frame">
                                {workout.plan[workout.idx].url.includes('youtube.com') || workout.plan[workout.idx].url.includes('youtu.be') ? (
                                    <div id="yt-player"></div>
                                ) : (
                                    <iframe src={workout.plan[workout.idx].url.replace('instagram.com/p/', 'instagram.com/p/') + 'embed'} allowFullScreen></iframe>
                                )}
                            </div>
                            <div className="card" style={{textAlign:'center'}}>
                                <div style={{fontSize:42, fontWeight:900}}>{Math.floor(workout.secondsLeft/60)}:{(workout.secondsLeft%60).toString().padStart(2,'0')}</div>
                                <h3 style={{margin:'5px 0'}}>{workout.plan[workout.idx].title}</h3>
                                <div className="btn-row">
                                    <button onClick={() => setPaused(!paused)}>{paused ? '▶️ Resume' : '⏸️ Pause'}</button>
                                    <button className="btn-sec" onClick={handleNext}>⏭️ Skip</button>
                                </div>
                                <button className="btn-sec" style={{marginTop:10}} onClick={() => setView('home')}>🚪 Exit</button>
                            </div>
                        </main>
                    )}

                    {editingVideo && (
                        <div className="overlay">
                            <div className="card" style={{width:'90%'}}>
                                <label>Edit Video</label>
                                <input value={editingVideo.title} onChange={e => setEditingVideo({...editingVideo, title: e.target.value})} />
                                <input value={editingVideo.url} onChange={e => setEditingVideo({...editingVideo, url: e.target.value})} />
                                <div className="btn-row">
                                    <button onClick={() => {
                                        setLib(lib.map(x => x.id === editingVideo.id ? editingVideo : x));
                                        setEditingVideo(null);
                                    }}>💾 Save</button>
                                    <button className="btn-sec" onClick={() => setEditingVideo(null)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
