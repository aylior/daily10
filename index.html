<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily20 Pro</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root { --bg: #121212; --card: #1e1e1e; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; }
.container { max-width: 500px; margin: 0 auto; }
.card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
button { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }
.btn-sec { background: #333; color: white; margin-top: 10px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
.day { aspect-ratio: 1; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; cursor: pointer; color: var(--dim); font-weight: bold; }
.day.complete { background: var(--neon); color: black; box-shadow: 0 0 15px rgba(255,153,0,0.4); }
.day.partial { border: 2px solid var(--neon); color: var(--neon); }
.video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; margin-bottom: 20px; background: #000; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; }
.celebrate { position: fixed; inset: 0; background: rgba(18,18,18,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

    const App = () => {
        const [view, setView] = useState('home');
        const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('lib') || '[]'));
        const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('hist') || '{}'));
        const [selectedDay, setSelectedDay] = useState(null);
        const [workout, setWorkout] = useState({ plan: [], idx: 0, seconds: 0 });
        const [showDone, setShowDone] = useState(false);

        useEffect(() => {
            localStorage.setItem('lib', JSON.stringify(lib));
            localStorage.setItem('hist', JSON.stringify(hist));
        }, [lib, hist]);

        const getID = (url) => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const startWorkout = () => {
            if (lib.length === 0) return alert("Add videos to Library first!");
            const shuffled = [...lib].sort(() => 0.5 - Math.random());
            let plan = [], total = 0;
            for (let v of shuffled) {
                let d = parseInt(v.dur);
                if (total + d <= 20) { plan.push(v); total += d; }
            }
            setWorkout({ plan, idx: 0, seconds: plan[0].dur * 60 });
            setView('workout');
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
        };

        useEffect(() => {
            let timer;
            if (view === 'workout' && workout.seconds > 0) {
                timer = setInterval(() => setWorkout(w => ({ ...w, seconds: w.seconds - 1 })), 1000);
            } else if (view === 'workout' && workout.seconds === 0) {
                if (workout.idx < workout.plan.length - 1) {
                    const next = workout.idx + 1;
                    setWorkout(w => ({ ...w, idx: next, seconds: w.plan[next].dur * 60 }));
                } else {
                    finishWorkout();
                }
            }
            return () => clearInterval(timer);
        }, [view, workout.seconds]);

        const finishWorkout = () => {
            const today = new Date().toISOString().split('T')[0];
            const dayData = hist[today] || { mins: 0, vids: [] };
            const newVids = [...new Set([...dayData.vids, ...workout.plan.map(p => p.title)])];
            setHist({ ...hist, [today]: { mins: Math.min(dayData.mins + 20, 20), vids: newVids } });
            setShowDone(true);
            setTimeout(() => { setShowDone(false); setView('home'); }, 4000);
        };

        return (
            <div className="container">
                {showDone && <div className="celebrate"><h1 style={{color:'var(--neon)',fontSize:'40px'}}>MISSION COMPLETE</h1><p>20 MINUTES LOGGED</p></div>}
                
                <h1 style={{color: 'var(--neon)', letterSpacing: '-1px'}} onClick={() => setView('home')}>DAILY20</h1>

                {view === 'home' && (
                    <div>
                        <div className="card" style={{textAlign:'center'}}>
                            <h2>Today's Session</h2>
                            <button onClick={startWorkout} style={{fontSize:'18px'}}>START 20 MINS</button>
                            <button className="btn-sec" onClick={() => setView('lib')}>LIBRARY</button>
                        </div>
                        <div className="calendar">
                            {[...Array(28)].map((_, i) => {
                                const d = new Date(); d.setDate(d.getDate() - (27 - i));
                                const s = d.toISOString().split('T')[0];
                                const h = hist[s];
                                const cls = h?.mins >= 20 ? 'complete' : h?.mins > 0 ? 'partial' : '';
                                return <div key={i} className={`day ${cls}`} onClick={() => h && setSelectedDay({date: s, ...h})}>{d.getDate()}</div>
                            })}
                        </div>
                    </div>
                )}

                {view === 'lib' && (
                    <div>
                        <form className="card" onSubmit={e => {
                            e.preventDefault();
                            const f = new FormData(e.target);
                            setLib([{ id: Date.now(), title: f.get('t'), url: f.get('u'), dur: f.get('d') }, ...lib]);
                            e.target.reset();
                        }}>
                            <h3>Add Video</h3>
                            <input name="u" placeholder="YouTube URL" required />
                            <input name="t" placeholder="Title" required />
                            <input name="d" type="number" placeholder="Duration (Minutes)" required />
                            <button type="submit">ADD TO LIST</button>
                        </form>
                        {lib.map(v => (
                            <div key={v.id} className="card" style={{display:'flex', justifyContent:'space-between', padding:'15px'}}>
                                <span>{v.title} ({v.dur}m)</span>
                                <span style={{color:'var(--danger)', fontWeight:'bold'}} onClick={() => setLib(lib.filter(x => x.id !== v.id))}>REMOVE</span>
                            </div>
                        ))}
                        <button className="btn-sec" onClick={() => setView('home')}>BACK</button>
                    </div>
                )}

                {view === 'workout' && workout.plan.length > 0 && (
                    <div style={{textAlign: 'center'}}>
                        <div className="video-container">
                            <iframe src={`https://www.youtube.com/embed/${getID(workout.plan[workout.idx].url)}?autoplay=1&playsinline=1`} allow="autoplay; encrypted-media" allowFullScreen></iframe>
                        </div>
                        <h2 style={{fontSize: '50px', color: 'var(--neon)', margin: '10px 0'}}>
                            {Math.floor(workout.seconds / 60)}:{(workout.seconds % 60).toString().padStart(2, '0')}
                        </h2>
                        <p>{workout.plan[workout.idx].title}</p>
                        <button className="btn-sec" style={{color:'var(--danger)'}} onClick={() => setView('home')}>QUIT WORKOUT</button>
                    </div>
                )}

                {selectedDay && (
                    <div className="modal" onClick={() => setSelectedDay(null)}>
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <h2 style={{color:'var(--neon)'}}>{selectedDay.date}</h2>
                            <p>Progress: {selectedDay.mins} / 20 mins</p>
                            <div style={{textAlign:'left', margin:'15px 0', fontSize:'14px'}}>
                                <strong>Videos:</strong> {selectedDay.vids?.join(', ')}
                            </div>
                            <button className="btn-sec" onClick={() => {
                                const newH = {...hist}; delete newH[selectedDay.date];
                                setHist(newH); setSelectedDay(null);
                            }}>RESET DAY</button>
                            <button className="btn-sec" onClick={() => setSelectedDay(null)}>CLOSE</button>
                        </div>
                    </div>
                )}
            </div>
        );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
