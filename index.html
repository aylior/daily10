<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily20 Pro | v68</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --neon: #ff9900; --text: #ffffff; --dim: #888888; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .card { background: var(--card); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #282828; }
        
        .header-box { text-align: center; margin-bottom: 8px; }
        .app-title { color: var(--neon); margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .v-tag { color: var(--dim); font-size: 9px; font-family: monospace; display: block; margin-top: -2px; }

        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: var(--neon); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; flex: 1; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; }
        .btn-sec { background: #2a2a2a; color: white; }
        .btn-neon-ghost { background: #2a2a2a; color: var(--neon); }
        .btn-icon { width: 40px; height: 40px; flex: none; padding: 0; }
        
        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; background: #1f1f1f; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 1px solid transparent; }
        .cal-day.active-day { background: #2a2a2a; }
        .cal-day.today { border: 2px solid var(--neon); }
        .cal-day.has-data { color: var(--neon); }
        .cal-m { font-weight: 900; font-size: 10px; }
        
        /* Player & Timer */
        .workout-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .player-frame { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .player-frame iframe { width: 100%; height: 100%; border: none; }
        .workout-footer { background: var(--bg); padding: 20px 20px 40px; border-top: 1px solid #333; text-align: center; }
        .timer-display { font-size: 64px; font-weight: 900; color: var(--neon); font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 5px; }
        .timer-status { font-size: 10px; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; letter-spacing: 1px; }

        /* General */
        input, select, textarea { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .streak-box { text-align: center; color: var(--neon); font-weight: 800; font-size: 14px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const getLocalDateKey = (d = new Date()) => {
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [lib, setLib] = useState(() => JSON.parse(localStorage.getItem('d20_lib')) || []);
            const [hist, setHist] = useState(() => JSON.parse(localStorage.getItem('d20_hist')) || {});
            const [goal, setGoal] = useState(() => parseInt(localStorage.getItem('d20_goal')) || 20);
            const [workout, setWorkout] = useState({ plan: [], idx: 0, secondsLeft: 0, isActive: false });
            const [playerPaused, setPlayerPaused] = useState(true);
            const [inspecting, setInspecting] = useState(null);

            const todayKey = getLocalDateKey();
            const playerRef = useRef(null);
            
            // Calculate daily total from history items
            const getDailyTotal = (key) => {
                const day = hist[key];
                if (!day || !day.items) return day?.totalMins || 0;
                return day.items.reduce((acc, item) => acc + (item.mins || 0), 0);
            };

            const streak = useMemo(() => {
                let count = 0; let check = new Date();
                while (true) {
                    const k = getLocalDateKey(check);
                    if (getDailyTotal(k) >= goal) { count++; check.setDate(check.getDate() - 1); }
                    else { if (k === todayKey) { check.setDate(check.getDate() - 1); continue; } break; }
                }
                return count;
            }, [hist, goal, todayKey]);

            useEffect(() => {
                localStorage.setItem('d20_lib', JSON.stringify(lib));
                localStorage.setItem('d20_hist', JSON.stringify(hist));
                localStorage.setItem('d20_goal', goal.toString());
            }, [lib, hist, goal]);

            // Timer Logic synced with Player State
            useEffect(() => {
                let ticker;
                if (workout.isActive && !playerPaused) {
                    ticker = setInterval(() => {
                        setWorkout(prev => {
                            if (prev.secondsLeft <= 1) {
                                handleSkip();
                                return prev;
                            }
                            return { ...prev, secondsLeft: prev.secondsLeft - 1 };
                        });

                        // Log every 10 seconds to history for granular tracking
                        setHist(prev => {
                            const currentDay = prev[todayKey] || { items: [] };
                            const currentVideoTitle = workout.plan[workout.idx].title;
                            let items = [...(currentDay.items || [])];
                            
                            let activeItem = items.find(i => i.label === currentVideoTitle);
                            if (activeItem) {
                                activeItem.mins = (activeItem.mins || 0) + (1/60);
                            } else {
                                items.push({ label: currentVideoTitle, mins: 1/60 });
                            }
                            return { ...prev, [todayKey]: { items } };
                        });
                    }, 1000);
                }
                return () => clearInterval(ticker);
            }, [workout.isActive, playerPaused, workout.idx]);

            // YouTube API Listener
            useEffect(() => {
                if (view === 'workout') {
                    window.onYouTubeIframeAPIReady = () => {
                        playerRef.current = new YT.Player('yt-player', {
                            events: {
                                'onStateChange': (e) => {
                                    if (e.data === YT.PlayerState.PLAYING) setPlayerPaused(false);
                                    else setPlayerPaused(true);
                                }
                            }
                        });
                    };
                    if (!window.YT) {
                        const tag = document.createElement('script');
                        tag.src = "https://www.youtube.com/iframe_api";
                        document.head.appendChild(tag);
                    } else {
                        window.onYouTubeIframeAPIReady();
                    }
                }
            }, [view, workout.idx]);

            const handleSkip = () => {
                if (workout.idx + 1 < workout.plan.length) {
                    setWorkout(prev => ({
                        ...prev,
                        idx: prev.idx + 1,
                        secondsLeft: prev.plan[prev.idx + 1].durSec
                    }));
                } else {
                    setView('home');
                    setWorkout({ ...workout, isActive: false });
                }
            };

            return (
                <div className="container">
                    <header className="header-box">
                        <h1 className="app-title">DAILY20</h1>
                        <span className="v-tag">VERSION 68.0</span>
                    </header>

                    {view === 'home' && (
                        <>
                            <div className="card">
                                <label>Training Goal</label>
                                <select value={goal} onChange={e => setGoal(parseInt(e.target.value))}>
                                    {[10, 20, 30, 45, 60].map(g => <option key={g} value={g}>{g} Minutes</option>)}
                                </select>
                                <button onClick={() => {
                                    if (lib.length === 0) return alert('Library empty');
                                    const plan = [...lib].sort(() => 0.5 - Math.random()).slice(0, 3);
                                    setWorkout({ plan, idx: 0, secondsLeft: plan[0].durSec, isActive: true });
                                    setView('workout');
                                }}>Start Random Workout</button>
                                <button className="btn-sec" style={{marginTop:8}} onClick={() => setView('lib')}>Video Library</button>
                            </div>

                            <div className="card">
                                <div style={{textAlign:'center', fontSize:28, fontWeight:900}}>
                                    {Math.floor(getDailyTotal(todayKey))} <small style={{color:'var(--dim)', fontSize:14}}>/ {goal}m</small>
                                </div>
                                <div className="cal-grid">
                                    {Array.from({length: 21}).map((_, i) => {
                                        const d = new Date(); d.setDate(d.getDate() - (20 - i));
                                        const k = getLocalDateKey(d);
                                        const total = getDailyTotal(k);
                                        return (
                                            <div key={k} 
                                                className={`cal-day ${total > 0 ? 'has-data' : ''} ${k === todayKey ? 'today' : ''}`}
                                                onClick={() => setInspecting({key: k, date: d.toDateString(), items: hist[k]?.items || []})}
                                            >
                                                <span>{d.getDate()}</span>
                                                {total > 0 && <span className="cal-m">{Math.floor(total)}m</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="streak-box">🔥 {streak} Day Streak</div>
                            </div>
                        </>
                    )}

                    {view === 'lib' && (
                        <div className="card">
                            <button className="btn-neon-ghost" onClick={() => setView('home')}>← Back</button>
                            <p style={{textAlign:'center', color:'var(--dim)'}}>Library management would go here (v67 features)</p>
                        </div>
                    )}

                    {view === 'workout' && (
                        <div className="workout-ui">
                            <div className="player-frame">
                                <iframe 
                                    id="yt-player"
                                    src={`https://www.youtube.com/embed/${workout.plan[workout.idx].url.split('v=')[1]}?enablejsapi=1&autoplay=1`} 
                                    allow="autoplay"
                                ></iframe>
                            </div>
                            <div className="workout-footer">
                                <div className="timer-display">
                                    {Math.floor(workout.secondsLeft/60)}:{(workout.secondsLeft%60).toString().padStart(2,'0')}
                                </div>
                                <div className="timer-status">{playerPaused ? 'Paused' : 'Counting...'}</div>
                                <h3 style={{margin:'0 0 15px 0'}}>{workout.plan[workout.idx].title}</h3>
                                <div className="btn-row">
                                    <button className="btn-sec" onClick={handleSkip}>Skip</button>
                                    <button onClick={() => setView('home')}>End</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {inspecting && (
                        <div className="overlay" onClick={() => setInspecting(null)}>
                            <div className="card" style={{width:'90%', maxWidth:350}} onClick={e => e.stopPropagation()}>
                                <h3 style={{marginTop:0}}>{inspecting.date}</h3>
                                <label>Activity Breakdown</label>
                                <div style={{maxHeight: 200, overflowY: 'auto', marginBottom: 15}}>
                                    {inspecting.items.length > 0 ? inspecting.items.map((item, i) => (
                                        <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #333'}}>
                                            <span style={{fontSize:13}}>{item.label}</span>
                                            <span style={{color: 'var(--neon)', fontWeight:800}}>{Math.round(item.mins)}m</span>
                                        </div>
                                    )) : <div style={{color:'var(--dim)'}}>No activity recorded.</div>}
                                </div>
                                <button onClick={() => setInspecting(null)}>Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
